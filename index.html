<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>polvoo</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #7c6dfa;
      --accent-hover: #9b8dff;
      --code-bg: #111;
      --green: #4ade80;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13, 13, 13, 0.85);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-logo span {
      color: var(--accent);
    }

    .nav-link {
      font-size: 0.875rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: var(--text);
    }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1.5rem 5rem;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      background: rgba(124, 109, 250, 0.1);
      border: 1px solid rgba(124, 109, 250, 0.25);
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      margin-bottom: 2rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    h1 {
      font-family: var(--font-mono);
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description {
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 3rem;
    }

    /* ── INSTALL BLOCK ── */
    .install-wrapper {
      width: 100%;
      max-width: 420px;
      margin-bottom: 2.5rem;
    }

    .install-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.6rem;
      text-align: left;
    }

    .install-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem 0.85rem 1.2rem;
      gap: 0.75rem;
      transition: border-color 0.2s;
    }

    .install-box:hover {
      border-color: #3a3a3a;
    }

    .install-cmd {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .install-cmd .prompt {
      color: var(--muted);
      user-select: none;
      margin-right: 0.5rem;
    }

    .install-cmd .cmd-brew {
      color: #f59e0b;
    }

    .install-cmd .cmd-install {
      color: var(--accent);
    }

    .install-cmd .cmd-pkg {
      color: var(--text);
    }

    .copy-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .copy-btn:hover {
      color: var(--text);
      border-color: #3a3a3a;
      background: #1f1f1f;
    }

    .copy-btn.copied {
      color: var(--green);
      border-color: rgba(74, 222, 128, 0.3);
    }

    .copy-btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── CTA BUTTONS ── */
    .cta-group {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(124, 109, 250, 0.35);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: #3a3a3a;
      background: var(--surface);
    }

    .btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: #444;
      border-top: 1px solid var(--border);
    }

    footer a {
      color: #555;
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--muted);
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="#"><span>~</span> polvoo</a>
    <a class="nav-link" href="https://github.com/VladMogwai/landing-polvoo" target="_blank" rel="noopener">
      GitHub →
    </a>
  </nav>

  <main class="hero">

    <div class="badge">CLI tool</div>

    <h1>polvoo</h1>

    <p class="description">
      A placeholder description — replace me with what polvoo actually does.
      Fast, minimal, built for the terminal.
    </p>

    <div class="install-wrapper">
      <div class="install-label">Install</div>
      <div class="install-box">
        <span class="install-cmd">
          <span class="prompt">$</span><span class="cmd-brew">brew</span> <span class="cmd-install">install</span> <span class="cmd-pkg">polvoo</span>
        </span>
        <button class="copy-btn" id="copyBtn" onclick="copyInstall()" aria-label="Copy install command">
          <svg viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copyLabel">copy</span>
        </button>
      </div>
    </div>

    <div class="cta-group">
      <a class="btn btn-primary" href="https://github.com/VladMogwai/landing-polvoo" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        View on GitHub
      </a>
      <a class="btn btn-ghost" href="https://github.com/VladMogwai/landing-polvoo#readme" target="_blank" rel="noopener">
        Docs
      </a>
    </div>

  </main>

  <footer>
    <p>Built with ♥ &nbsp;·&nbsp; <a href="https://github.com/VladMogwai/landing-polvoo" target="_blank" rel="noopener">github.com/VladMogwai/landing-polvoo</a></p>
  </footer>

  <script>
    function copyInstall() {
      const cmd = 'brew install polvoo';
      const btn = document.getElementById('copyBtn');
      const label = document.getElementById('copyLabel');

      navigator.clipboard.writeText(cmd).then(() => {
        btn.classList.add('copied');
        label.textContent = 'copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          label.textContent = 'copy';
        }, 2000);
      }).catch(() => {
        // fallback for older browsers
        const el = document.createElement('textarea');
        el.value = cmd;
        el.style.position = 'fixed';
        el.style.opacity = '0';
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        btn.classList.add('copied');
        label.textContent = 'copied!';
        setTimeout(() => {
          btn.classList.remove('copied');
          label.textContent = 'copy';
        }, 2000);
      });
    }
  </script>

</body>
</html>
